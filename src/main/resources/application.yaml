spring:
  application:
    name: message-app


  datasource:
    url: jdbc:h2:mem:teste;NON_KEYWORDS=user
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

security:
  jwt:
    secret: message-app
